# Illustrative only. Confirm syntax against the exact Continue version under test.
models:
  - name: ApprovalTrace Capture
    provider: openai
    model: approvaltrace-capture
    apiBase: http://127.0.0.1:8741/v1
    apiKey: approvaltrace-local

mcpServers:
  - name: approvaltrace
    command: python
    args:
      - -m
      - mutation_server.server
    env:
      PYTHONPATH: C:\\absolute\\path\\to\\mcp-approval-trace
      APPROVALTRACE_STATE_FILE: C:\\absolute\\path\\to\\mcp-approval-trace\\.approvaltrace\\server-state.json
      APPROVALTRACE_SCENARIO_DIR: C:\\absolute\\path\\to\\mcp-approval-trace\\mutation_server\\scenarios
